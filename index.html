<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0f172a" />
<meta name="apple-mobile-web-app-title" content="Upper Body" />
<title>Upper Body — Dumbbell &amp; Bench</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" href="icon-192.png" />
<style>
  :root{
    --bg:#0f172a; --bg2:#0b1220; --card:#1e293b; --card2:#233044;
    --text:#e2e8f0; --muted:#94a3b8; --line:#334155;
    --accent:#34d399; --accent2:#22d3ee; --warn:#fbbf24;
    --body:#cbd5e1; --bench:#475569; --bench2:#3a475a; --bar:#94a3b8; --plate:#34d399; --floor:#475569;
    --done:#34d399;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5; padding:0 0 calc(40px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:780px;margin:0 auto;padding:0 16px}
  header{padding:calc(18px + env(safe-area-inset-top)) 0 8px}
  h1{font-size:20px;margin:0;letter-spacing:.2px}
  h1 .ic{color:var(--accent)}
  .sub{color:var(--muted);font-size:13px;margin-top:2px}

  .today{
    margin-top:14px;background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);
    border:1px solid var(--line);border-radius:16px;padding:16px;
  }
  .today .lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent)}
  .today .name{font-size:22px;font-weight:700;margin-top:2px}
  .today .meta{color:var(--muted);font-size:13px;margin-top:4px}
  .bar{height:8px;background:#0b1220;border-radius:99px;margin-top:12px;overflow:hidden}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width .3s ease}
  .barlbl{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:6px}
  .reset{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer}
  .reset:active{background:var(--card2)}

  .week{display:flex;gap:6px;margin-top:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .day{
    flex:1 0 auto;min-width:44px;text-align:center;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:8px 4px;cursor:pointer;position:relative;transition:.15s;
  }
  .day:active{transform:scale(.96)}
  .day.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .day.today .dn{color:var(--accent)}
  .day .dn{font-size:12px;font-weight:700}
  .day .dt{font-size:10px;color:var(--muted);margin-top:2px;height:13px}
  .day .dot{width:6px;height:6px;border-radius:99px;background:var(--accent2);margin:4px auto 0}
  .day .dot.rest{background:var(--line)}
  .day .chk{position:absolute;top:3px;right:5px;font-size:11px;color:var(--done)}

  .sectitle{display:flex;align-items:baseline;gap:8px;margin:22px 2px 8px}
  .sectitle h2{font-size:17px;margin:0}
  .sectitle .tag{font-size:12px;color:var(--muted)}

  .warm{
    background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);color:#fde68a;
    border-radius:12px;padding:10px 12px;font-size:13px;margin-bottom:12px;
  }
  .warm b{color:var(--warn)}

  .rest-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px 16px;text-align:center}
  .rest-card .em{font-size:34px}
  .rest-card .t{font-weight:700;font-size:18px;margin-top:6px}
  .rest-card .d{color:var(--muted);font-size:14px;margin-top:4px}

  .ex{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:14px;overflow:hidden}
  .ex .top{display:flex;gap:12px;padding:14px 14px 6px}
  .exsvg{width:120px;height:84px;flex:0 0 auto;background:#0b1220;border-radius:10px;border:1px solid var(--line)}
  .ex .info{flex:1;min-width:0}
  .ex .nm{font-weight:700;font-size:16px}
  .ex .badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .badge{font-size:11px;border:1px solid var(--line);background:var(--bg2);color:var(--muted);border-radius:99px;padding:2px 8px}
  .badge.tgt{color:var(--accent);border-color:rgba(52,211,153,.4)}
  .badge.sr{color:var(--text)}

  .sets{display:flex;flex-wrap:wrap;gap:8px;padding:6px 14px 12px}
  .setbtn{
    width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--bg2);
    color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;transition:.12s;display:flex;
    align-items:center;justify-content:center;
  }
  .setbtn:active{transform:scale(.92)}
  .setbtn.on{background:var(--accent);border-color:var(--accent);color:#07120c}
  .sets .hint{align-self:center;font-size:11px;color:var(--muted);margin-left:2px}

  .guide-toggle{
    width:100%;text-align:left;background:var(--card2);border:none;border-top:1px solid var(--line);
    color:var(--text);padding:11px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;
    justify-content:space-between;align-items:center;
  }
  .guide-toggle .ar{transition:.2s;color:var(--muted)}
  .guide-toggle.open .ar{transform:rotate(180deg)}
  .guide{display:none;padding:6px 14px 16px;border-top:1px solid var(--line);background:var(--bg2)}
  .guide.open{display:block}
  .guide .big{width:100%;height:auto;max-height:240px;background:#0b1220;border:1px solid var(--line);border-radius:12px;margin:6px 0 12px}
  .guide h4{margin:12px 0 6px;font-size:13px;letter-spacing:.4px;text-transform:uppercase;color:var(--accent)}
  .guide h4.bad{color:var(--warn)}
  .guide ol,.guide ul{margin:0;padding-left:20px}
  .guide li{margin-bottom:6px;font-size:14px;color:#dbe4ee}
  .guide ul li{list-style:none;position:relative;padding-left:4px}
  .guide ul li::before{content:"✕";position:absolute;left:-18px;color:var(--warn);font-size:12px}

  footer{color:var(--muted);font-size:12px;text-align:center;margin-top:26px;line-height:1.7}
  footer a{color:var(--accent2)}
  .pill{display:inline-block;background:var(--card);border:1px solid var(--line);border-radius:99px;padding:3px 10px;margin:3px}

  /* tabs */
  .tabs{display:flex;gap:8px;margin-top:14px}
  .tab{flex:1;background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:12px;padding:11px;font-size:14px;font-weight:700;cursor:pointer}
  .tab:active{transform:scale(.98)}
  .tab.on{background:linear-gradient(135deg,var(--card),var(--card2));color:var(--text);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}

  /* nutrition */
  .ncard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:14px}
  .ncard h3{margin:0 0 4px;font-size:15px}
  .ncard h3 .muted{font-weight:400}
  .muted{color:var(--muted);font-size:13px}
  .tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
  .tnum{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 4px;text-align:center}
  .tnum .v{font-size:19px;font-weight:800}
  .tnum .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
  .tnum.carb{border-color:rgba(52,211,153,.5);background:rgba(52,211,153,.08)} .tnum.carb .v{color:var(--accent)}
  .breakdown{font-size:12px;color:var(--muted);margin-top:12px;line-height:1.7}
  .breakdown b{color:var(--text)}

  .field{display:block;margin-top:10px;font-size:12px;color:var(--muted)}
  .field input,.field select,.field textarea{width:100%;margin-top:5px;background:var(--bg2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:11px;font-size:16px;font-family:inherit}
  .field textarea{min-height:62px;resize:vertical}
  .field input:focus,.field select,.field textarea:focus{outline:none;border-color:var(--accent)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btn{background:var(--accent);color:#07120c;border:none;border-radius:10px;padding:12px 14px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:12px}
  .btn:active{transform:scale(.98)}
  .btn.sec{background:var(--card2);color:var(--text);border:1px solid var(--line)}
  .btn.ai{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#06121a}
  .btn:disabled{opacity:.5;cursor:default}

  .pbar{height:9px;background:var(--bg2);border-radius:99px;overflow:hidden;margin-top:5px}
  .pbar > i{display:block;height:100%;border-radius:99px;transition:width .3s ease}
  .pwrap{margin-top:12px}
  .pwrap .top{display:flex;justify-content:space-between;font-size:13px;gap:8px}
  .pwrap .top .r{color:var(--muted);text-align:right}

  .food{display:flex;gap:10px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:8px;align-items:flex-start}
  .food img{width:52px;height:52px;border-radius:8px;object-fit:cover;flex:0 0 auto}
  .food .ph{width:52px;height:52px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto}
  .food .fb{flex:1;min-width:0}
  .food .fn{font-weight:700;font-size:14px}
  .food .fnotes{font-size:12px;color:var(--muted);margin-top:2px;word-break:break-word}
  .food .fm{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .food .del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 2px;line-height:1}
  .chip{font-size:11px;border:1px solid var(--line);border-radius:99px;padding:2px 8px;color:var(--muted)}
  .chip.k{color:var(--text)} .chip.c{color:var(--accent);border-color:rgba(52,211,153,.4)}
  .status{font-size:13px;margin-top:8px;min-height:18px;color:var(--muted)}
  .status.err{color:#fca5a5} .status.ok{color:var(--accent)}
  .linkbtn{background:none;border:none;color:var(--accent2);font-size:12px;cursor:pointer;text-decoration:underline;padding:0}
  .warnbox{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);color:#fde68a;border-radius:12px;padding:12px;font-size:12.5px;margin-top:14px;line-height:1.6}
  .empty{background:var(--card);border:1px dashed var(--line);border-radius:16px;padding:22px 16px;text-align:center;color:var(--muted);margin-top:14px}

  /* schedule editor + running */
  .toolbar{display:flex;justify-content:flex-end;margin-top:10px}
  .miniedit{background:var(--card);border:1px solid var(--line);color:var(--accent2);border-radius:10px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .miniedit:active{transform:scale(.97)}
  .day .runmark{position:absolute;top:3px;left:5px;font-size:10px}
  .erow{display:grid;grid-template-columns:42px 1fr;gap:10px;align-items:start;margin-top:8px}
  .erow .dlab{font-size:13px;font-weight:700;color:var(--muted);padding-top:10px}
  .erow.today-row .dlab{color:var(--accent)}
  .erow select,.erow input{background:var(--bg2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px;font-size:15px;font-family:inherit;width:100%}
  .erow select:focus,.erow input:focus{outline:none;border-color:var(--accent)}
  .erow .sub{display:grid;grid-template-columns:1fr 1fr 1.4fr;gap:6px}
  .runrow{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-top:7px}
  .runrow.today{border-color:var(--accent)}
  .runrow .d{font-size:13px;font-weight:700} .runrow .d small{color:var(--muted);font-weight:400}
  .runrow .info{font-size:13px;color:var(--muted);text-align:right}
  .rt{display:inline-block;font-size:11px;border-radius:99px;padding:1px 8px;border:1px solid var(--line);color:var(--accent2);margin-right:6px}
  .hist{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid var(--line);padding:9px 0;font-size:13px}
  .hist:last-child{border-bottom:none}
  .hist .hl{color:var(--muted)} .hist .hr{text-align:right}
  .statline{display:flex;gap:8px;margin-top:14px}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
  .stat .v{font-size:20px;font-weight:800;color:var(--accent)} .stat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
  .pill.rest{opacity:.5}

  /* meal suggestions */
  .meal{margin-top:12px}
  .mealname{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
  .mitem{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px}
  .mitem:last-child{border-bottom:none}
  .mitem .mi-l b{color:var(--text)}
  .mitem .mi-r{color:var(--muted);white-space:nowrap}
  .mtot{margin-top:12px;padding-top:10px;border-top:1px solid var(--line);font-size:13px}
  .mtot b{color:var(--accent)}
</style>
</head>
<body>

<!-- shared SVG marker (arrowhead) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="var(--accent)"/>
    </marker>
  </defs>
</svg>

<div class="wrap">
  <header>
    <h1><span class="ic">▰</span> Upper Body · Dumbbell &amp; Bench</h1>
    <div class="sub">A 3-day weekly plan with form guides. Your progress saves on this device.</div>
  </header>

  <div class="tabs">
    <button class="tab on" data-view="workout">🏋️ Workout</button>
    <button class="tab" data-view="running">🏃 Running</button>
    <button class="tab" data-view="nutrition">🍽️ Nutrition</button>
  </div>

  <div id="view-workout">
  <div class="today" id="todayCard"></div>

  <div class="week" id="week"></div>

  <div class="toolbar"><button class="miniedit" id="editSplit">✏️ Edit weekly split</button></div>
  <div id="splitEditor"></div>

  <div class="sectitle">
    <h2 id="dayTitle"></h2>
    <span class="tag" id="dayTag"></span>
  </div>

  <div id="list"></div>
  </div><!-- /view-workout -->

  <div id="view-nutrition" style="display:none"></div>

  <div id="view-running" style="display:none"></div>

  <footer>
    <div id="splitSummary"></div>
    <div style="margin-top:10px">Tip: rest at least one day between sessions. Add weight when you can finish all sets with good form.</div>
    <div style="margin-top:6px;opacity:.7">Save this file anywhere — open it offline on iPhone or laptop. Not medical advice.</div>
  </footer>
</div>

<script>
/* ----------------------------------------------------------------------
   INFOGRAPHIC BUILDERS  (simple side-view figures)
   solid = working position · faded = start · green arrow = movement
---------------------------------------------------------------------- */
function db(cx,cy,deg){deg=deg||0;return `<g transform="translate(${cx} ${cy}) rotate(${deg})">
  <rect x="-15" y="-3.5" width="30" height="7" rx="3.5" fill="var(--bar)"/>
  <rect x="-19" y="-10" width="9" height="20" rx="3" fill="var(--plate)"/>
  <rect x="10" y="-10" width="9" height="20" rx="3" fill="var(--plate)"/></g>`;}
function lb(x1,y1,x2,y2,w){w=w||12;return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--body)" stroke-width="${w}" stroke-linecap="round"/>`;}
function hd(cx,cy,r){r=r||13;return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--body)"/>`;}
function gh(s){return `<g opacity="0.26">${s}</g>`;}
function arr(x1,y1,x2,y2){return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--accent)" stroke-width="3.2" stroke-linecap="round" stroke-dasharray="1 6" marker-end="url(#ah)"/>`;}
function arc(d){return `<path d="${d}" fill="none" stroke="var(--accent)" stroke-width="3.2" stroke-linecap="round" stroke-dasharray="1 6" marker-end="url(#ah)"/>`;}
function floor(){return `<line x1="20" y1="190" x2="280" y2="190" stroke="var(--floor)" stroke-width="3"/>`;}
function flatBench(){return floor()+
  `<rect x="58" y="120" width="184" height="14" rx="4" fill="var(--bench)"/>
   <rect x="74" y="134" width="9" height="56" rx="2" fill="var(--bench2)"/>
   <rect x="217" y="134" width="9" height="56" rx="2" fill="var(--bench2)"/>`;}
function svg(inner){return `<svg viewBox="0 0 300 210" xmlns="http://www.w3.org/2000/svg" class="exsvg">${inner}</svg>`;}

/* ---- scenes ---- */
function lying(arms){return svg(flatBench()
  + lb(168,116,196,150,13) + lb(196,150,210,186,11) + lb(210,186,224,186,8)  // leg
  + lb(98,114,168,116,17)                                                     // torso
  + hd(80,108)
  + arms);}

function incline(arms){return svg(floor()
  + `<polygon points="118,154 70,98 60,108 108,164" fill="var(--bench)"/>`     // backrest
  + `<rect x="120" y="150" width="92" height="13" rx="4" fill="var(--bench)"/>` // seat
  + `<rect x="128" y="163" width="9" height="27" rx="2" fill="var(--bench2)"/>`
  + `<rect x="196" y="163" width="9" height="27" rx="2" fill="var(--bench2)"/>`
  + lb(150,150,200,152,13) + lb(200,152,200,188,11)                            // leg
  + lb(105,118,150,150,17)                                                     // torso along backrest
  + hd(90,108)
  + arms);}

function standing(arms){return svg(floor()
  + lb(150,120,144,155,14) + lb(144,155,148,188,12)
  + lb(150,74,150,120,18)
  + hd(150,56)
  + arms);}

function seated(arms){return svg(floor()
  + `<rect x="112" y="150" width="86" height="13" rx="4" fill="var(--bench)"/>`
  + `<polygon points="112,150 106,96 116,96 122,150" fill="var(--bench)"/>`     // backrest
  + `<rect x="120" y="163" width="9" height="27" rx="2" fill="var(--bench2)"/>`
  + `<rect x="182" y="163" width="9" height="27" rx="2" fill="var(--bench2)"/>`
  + lb(150,150,196,150,14) + lb(196,150,196,188,12)                            // thigh+shin
  + lb(150,98,150,150,17)                                                      // torso
  + hd(150,80)
  + arms);}

function bent(arms){return svg(floor()
  + lb(180,128,190,160,14) + lb(190,160,176,188,12)                           // leg
  + lb(96,116,180,128,17)                                                      // torso (hinged)
  + hd(80,110)
  + arms);}

function benchBrace(arms){return svg(floor()
  + `<rect x="52" y="120" width="80" height="13" rx="4" fill="var(--bench)"/>`
  + `<rect x="60" y="133" width="9" height="57" rx="2" fill="var(--bench2)"/>`
  + `<rect x="116" y="133" width="9" height="57" rx="2" fill="var(--bench2)"/>`
  + lb(200,122,206,158,14) + lb(206,158,196,188,12)                           // leg
  + lb(150,108,200,122,17)                                                      // torso
  + lb(150,108,96,122,11)                                                       // bracing arm to bench
  + hd(166,102)
  + arms);}

/* ---- the 12 infographics ---- */
const ART = {
  flatpress: lying(
      gh(lb(98,114,118,122,11)+lb(118,122,104,98,9)) + gh(db(104,94))
    + lb(98,114,110,84,11) + lb(110,84,118,56,9) + db(118,52)
    + arr(112,94,118,62)),
  incpress: incline(
      gh(lb(105,118,124,124,11)+lb(124,124,112,100,9)) + gh(db(110,98))
    + lb(105,118,114,90,11) + lb(114,90,122,62,9) + db(124,58)
    + arr(120,98,124,66)),
  flye: lying(
      gh(lb(98,114,98,138,11)+lb(98,138,72,150,9)) + gh(db(66,150,80))
    + lb(98,114,112,92,11) + lb(112,92,124,74,9) + db(128,72)
    + arc("M78 144 Q96 96 124 80")),
  ohtri: standing(
      gh(lb(150,76,150,48,11)+lb(150,48,170,62,9)) + gh(db(174,64,90))
    + lb(150,76,150,46,11) + lb(150,46,150,22,9) + db(150,18)
    + arr(170,56,154,28)),
  onerow: benchBrace(
      gh(lb(150,108,150,136,11)+lb(150,136,150,160,9)) + gh(db(150,164))

const KEY="ubw_progress_v1";
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}}

function dateKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function today(){return new Date()}
const TKEY=dateKey(today());

let selectedDow = today().getDay();

  for(let i=1;i<=7;i++){const d=(today().getDay()+i)%7; if(WEEKMAP[d]){selectedDow=d;break;}}
}

function weekDates(){ // Mon..Sun dates of the current week
  const t=today(); const day=t.getDay(); const mondayOffset=(day===0?-6:1-day);
  const arr=[]; for(let i=0;i<7;i++){const d=new Date(t); d.setDate(t.getDate()+mondayOffset+i); arr.push(d);} return arr;
}
function exDone(exId,dk){const p=load(); const a=(p[dk]||{})[exId]; if(!a)return false; const need=EX[exId].sets; let c=0; for(let i=0;i<need;i++) if(a[i])c++; return c===need;}
function dayComplete(dowKey,dk){const w=WEEKMAP[dowKey]; if(!w)return false; return DAYS[w].ex.every(id=>exDone(id,dk));}

function todayProgress(){
  const w=WEEKMAP[today().getDay()]; if(!w)return null;
  const p=load(); let total=0,done=0;
  DAYS[w].ex.forEach(id=>{total+=EX[id].sets; const a=(p[TKEY]||{})[id]||[]; for(let i=0;i<EX[id].sets;i++) if(a[i])done++;});
  return {total,done,key:w};
}

function toggleSet(exId,setIdx,btn){
  const p=load(); if(!p[TKEY])p[TKEY]={}; if(!p[TKEY][exId])p[TKEY][exId]=[];

function resetToday(){

const ACT={sed:1.2, light:1.35, mod:1.5, high:1.7};
const GOAL={
  lose:{adj:-0.20,pro:2.0,l:"Lose fat"},
  maint:{adj:0,pro:1.6,l:"Maintain"},
  build:{adj:0.10,pro:2.0,l:"Build muscle"},
  gain:{adj:0.15,pro:1.8,l:"Gain weight"}
};

function liftMinutes(dow){var w=WEEKMAP[dow]; if(!w)return 0; var min=5; DAYS[w].ex.forEach(function(id){var e=EX[id]; var rest=parseInt(e.rest)||60; min+=e.sets*(35+rest)/60;}); return Math.round(min);}
function liftKcal(dow,kg){var min=liftMinutes(dow); return Math.round(5*3.5*kg/200*min);}        // MET 5 for free weights
function runKcal(run,kg){ if(run.km>0) return Math.round(run.km*kg*1.036); if(run.min>0) return Math.round(9.8*3.5*kg/200*run.min); return 0; }

function computeTargets(dk,dow){
  var p=getProfile(); if(!p)return null;
  var kg=+p.weight, cm=+p.height, age=+p.age;
  var bmr = 10*kg + 6.25*cm - 5*age + (p.sex==="f"?-161:5);
  var base = bmr*(ACT[p.activity]||1.2);
  var lift = liftKcal(dow,kg);
  var run  = runKcal(getRun(dk),kg);
  var g = GOAL[p.goal]||GOAL.maint;
  var tdee = base+lift+run;
  var cal = Math.round(tdee*(1+g.adj));
  var protein = Math.round(kg*g.pro);
  var fat = Math.round(cal*0.25/9);
  var carbs = Math.max(0, Math.round((cal - protein*4 - fat*9)/4));
  return {cal:cal, protein:protein, fat:fat, carbs:carbs, base:Math.round(base), lift:lift, run:run, goal:g.l, adj:Math.round(cal-tdee)};
}

  var wname = WEEKMAP[dow]?DAYS[WEEKMAP[dow]].title:"Rest day";
  var foods=getFoods(dk);
  var eaten=foods.reduce(function(a,f){a.cal+=+f.kcal||0;a.carb+=+f.carb||0;a.pro+=+f.protein||0;a.fat+=+f.fat||0;return a;},{cal:0,carb:0,pro:0,fat:0});
  var r=getRun(dk);

  var h="";
  /* targets */
  h+='<div class="ncard"><h3>🎯 Today’s targets <span class="muted">· '+DOW[dow]+' · '+wname+'</span></h3>'
    +'<div class="tgrid">'+tnum(t.cal,"kcal","")+tnum(t.carbs+"g","carbs","carb")+tnum(t.protein+"g","protein","")+tnum(t.fat+"g","fat","")+'</div>'
    +'<div class="breakdown">Base burn <b>'+t.base+'</b> + lifting <b>'+t.lift+'</b> + running <b>'+t.run+'</b> = <b>'+(t.base+t.lift+t.run)+'</b> kcal'
      +'<br>Goal: <b>'+t.goal+'</b> ('+(t.adj>=0?"+":"")+t.adj+' kcal) → eat <b>'+t.cal+'</b> kcal'
      +'<br><span style="color:var(--accent)">Carbs rise on bigger training days to fuel your lifts &amp; runs.</span></div></div>';

  /* running (read-only summary; logging happens in the Running tab) */
  var runTxt = (+r.km||+r.min) ? ((r.type?r.type+" run · ":"")+(+r.km?r.km+" km":"")+(+r.km&&+r.min?" · ":"")+(+r.min?r.min+" min":"")+" → +"+t.run+" kcal added") : "No run logged today.";
  h+='<div class="ncard"><h3>🏃 Today’s running</h3>'
    +'<div class="muted">'+runTxt+'</div>'
    +'<button class="btn sec" id="goRunning">Open Running tab to log a run</button></div>';

  /* meal suggestions */
  var prefs = localStorage.getItem(FPKEY)||"";
  var plan = getMealSug(dk);
  h+='<div class="ncard"><h3>🍱 What to eat today</h3>'
    +'<div class="muted">A practical day of common, easy-to-buy foods that hits your <b>'+t.cal+' kcal</b> / <b>'+t.carbs+'g carb</b> target.</div>'
    +'<label class="field">Preferences (optional)<input id="mealPrefs" value="'+esc(prefs)+'" placeholder="e.g. no pork, I like rice &amp; chicken, quick options"></label>'
    +'<button class="btn ai" id="suggestBtn">'+(plan?"✨ Suggest a new plan":"✨ Suggest meals for my target")+'</button>'
    +'<div class="status" id="sugStatus"></div>'
    +'<div id="mealPlan">'+mealPlanHtml(plan,t)+'</div></div>';

  /* eaten + log */
  h+='<div class="ncard"><h3>📊 Eaten today</h3>'
    +prog("Calories",eaten.cal,t.cal,"kcal")+prog("Carbs",eaten.carb,t.carbs,"g")
    +prog("Protein",eaten.pro,t.protein,"g")+prog("Fat",eaten.fat,t.fat,"g")
    +'<div style="height:6px"></div>';
  if(foods.length){ foods.forEach(function(f){h+=foodRow(f);}); }
  else { h+='<div class="muted" style="margin-top:10px">No foods logged yet — add what you plan to eat below.</div>'; }
  h+='</div>';

  /* add food */
  h+='<div class="ncard"><h3>➕ Add a food</h3>'
    +'<label class="field">📷 Photo (optional)<input id="foodPhoto" type="file" accept="image/*" capture="environment"></label>'
    +'<div id="photoPreview"></div>'
    +'<label class="field">Notes / ingredients<textarea id="foodNotes" placeholder="e.g. Chicken rice — about 2 cups rice, 1 grilled chicken thigh, fried egg, cucumber"></textarea></label>'
    +'<button class="btn ai" id="estimateBtn">✨ Estimate calories with AI</button>'
    +'<div class="status" id="estStatus"></div>'
    +'<div class="row2"><label class="field">Name<input id="fName" placeholder="Food name"></label>'
      +'<label class="field">Calories<input id="fKcal" type="number" inputmode="numeric"></label></div>'
    +'<div class="row2"><label class="field">Carbs (g)<input id="fCarb" type="number" inputmode="numeric"></label>'
      +'<label class="field">Protein (g)<input id="fPro" type="number" inputmode="numeric"></label></div>'
    +'<label class="field">Fat (g)<input id="fFat" type="number" inputmode="numeric"></label>'
    +'<button class="btn" id="addFood">Add to today</button></div>';

  /* settings */
  h+='<div class="ncard"><h3>⚙️ Settings</h3>'+apiKeyBlock()
    +'<button class="btn sec" id="editProfile">Edit profile</button><div id="profileEditWrap"></div></div>';

  h+='<div class="warnbox">⚠️ Targets and AI estimates are approximations to guide you — not medical or dietary advice. The AI estimate needs an internet connection; everything else works offline.</div>';

  el.innerHTML=h;
  bindNutrition(dk);
}

/* ---- bindings ---- */
function bindProfile(){

  b.onclick=function(){
    var p={sex:val("pSex"),age:val("pAge"),height:val("pHeight"),weight:val("pWeight"),activity:val("pAct"),goal:val("pGoal")};
    if(!p.age||!p.height||!p.weight){alert("Please fill in age, height and weight.");return;}
    setProfileData(p); renderNutrition();
  };
}
function bindNutrition(dk){
  bindProfile();
  var photoData={v:null};

  var gr=document.getElementById("goRunning");
  if(gr) gr.onclick=function(){ switchTab("running"); };

  var sb=document.getElementById("suggestBtn"); if(sb) sb.onclick=function(){ suggestMeals(dk); };
  var addP=document.getElementById("addPlan"); if(addP) addP.onclick=function(){ addPlanToLog(dk); };
  var clrP=document.getElementById("clearPlan"); if(clrP) clrP.onclick=function(){ deleteMealSug(dk); renderNutrition(); };
  var mp=document.getElementById("mealPrefs"); if(mp) mp.onchange=function(){ localStorage.setItem(FPKEY, mp.value); };

  var pf=document.getElementById("foodPhoto");
  if(pf) pf.onchange=function(){ var file=pf.files[0]; if(!file)return;
    compressImage(file,function(d){ photoData.v=d; document.getElementById("photoPreview").innerHTML='<img src="'+d+'" style="width:84px;height:84px;object-fit:cover;border-radius:10px;margin-top:8px">'; }); };

  var eb=document.getElementById("estimateBtn"); if(eb) eb.onclick=function(){ aiEstimate(photoData.v); };

  var af=document.getElementById("addFood");
  if(af) af.onclick=function(){
    var f={id:"f"+Date.now()+Math.floor(Math.random()*1e4), name:val("fName")||"Food", notes:val("foodNotes"),
           photo:photoData.v, kcal:+val("fKcal")||0, carb:+val("fCarb")||0, protein:+val("fPro")||0, fat:+val("fFat")||0};
    if(!f.kcal && !f.notes && !f.photo){alert("Add a photo, some notes, or calories first.");return;}
    var arr=getFoods(dk); arr.push(f); saveFoods(dk,arr); renderNutrition();
  };

  document.querySelectorAll("[data-del]").forEach(function(b){
    b.onclick=function(){ var id=b.getAttribute("data-del"); saveFoods(dk,getFoods(dk).filter(function(x){return x.id!==id;})); renderNutrition(); };
  });

  var sk=document.getElementById("saveKey"); if(sk) sk.onclick=function(){ var v=val("apiKey"); if(v){localStorage.setItem(AKEY,v); renderNutrition();} };
  var ck=document.getElementById("clearKey"); if(ck) ck.onclick=function(){ localStorage.removeItem(AKEY); renderNutrition(); };
  var ep=document.getElementById("editProfile"); if(ep) ep.onclick=function(){ document.getElementById("profileEditWrap").innerHTML=profileForm(getProfile(),false); bindProfile(); };
}

function compressImage(file,cb){
  var rd=new FileReader();
  rd.onload=function(){ var img=new Image(); img.onload=function(){
    var max=512,w=img.width,h=img.height;
    if(w>h){ if(w>max){h=Math.round(h*max/w); w=max;} } else { if(h>max){w=Math.round(w*max/h); h=max;} }
    var c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h);
    cb(c.toDataURL("image/jpeg",0.6));
  }; img.src=rd.result; };
  rd.readAsDataURL(file);
}

function aiEstimate(photoData){
  var key=localStorage.getItem(AKEY);
  var st=document.getElementById("estStatus");
  var notes=val("foodNotes");
  if(!key){ st.className="status err"; st.textContent="Set your Anthropic API key in Settings (below) first."; return; }
  if(!notes && !photoData){ st.className="status err"; st.textContent="Add a photo and/or notes to estimate."; return; }
  st.className="status"; st.textContent="✨ Estimating… (needs internet)";
  var btn=document.getElementById("estimateBtn"); if(btn)btn.disabled=true;

  var content=[];
  if(photoData) content.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:photoData.split(",")[1]}});
  content.push({type:"text",text:'You are a nutrition estimator. Estimate the TOTAL calories and macros for the single portion of food shown and/or described. Assume realistic restaurant/home serving sizes if amounts are vague. Respond with ONLY a compact JSON object and no other text: {"name":"short food name","calories":<int>,"carbs_g":<int>,"protein_g":<int>,"fat_g":<int>}. Food: '+(notes||"(see image)")});

  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:AI_MODEL,max_tokens:300,messages:[{role:"user",content:content}]})
  })
  .then(function(res){return res.json();})
  .then(function(data){
    if(data.error) throw new Error(data.error.message||"API error");
    var txt=(data.content&&data.content[0]&&data.content[0].text)||"";
    var m=txt.match(/\{[\s\S]*\}/); if(!m) throw new Error("Couldn't read the estimate.");
    var j=JSON.parse(m[0]);
    if(j.name && !val("fName")) setVal("fName",j.name);
    setVal("fKcal",Math.round(j.calories||0)); setVal("fCarb",Math.round(j.carbs_g||0));
    setVal("fPro",Math.round(j.protein_g||0)); setVal("fFat",Math.round(j.fat_g||0));
    st.className="status ok"; st.textContent="✓ Estimated — adjust if needed, then tap Add.";
  })
  .catch(function(e){ st.className="status err"; st.textContent="Error: "+e.message+" (check your key & internet)"; })
  .then(function(){ if(btn)btn.disabled=false; });
}

/* ---- meal suggestions ---- */
function mealPlanHtml(plan,t){
  if(!plan || !plan.meals) return "";
  var h="";
  plan.meals.forEach(function(m){
    h+='<div class="meal"><div class="mealname">'+esc(m.name||"Meal")+'</div>';
    (m.items||[]).forEach(function(it){
      h+='<div class="mitem"><div class="mi-l"><b>'+esc(it.qty||"")+'</b> '+esc(it.food||"")+'</div>'
        +'<div class="mi-r">'+Math.round(it.calories||0)+' kcal</div></div>';
    });
    h+='</div>';
  });
  var tot=plan.totals||{};
  h+='<div class="mtot">Plan total: <b>'+Math.round(tot.calories||0)+'</b> kcal · '+Math.round(tot.carbs_g||0)+'g C · '
    +Math.round(tot.protein_g||0)+'g P · '+Math.round(tot.fat_g||0)+'g F <span class="muted">(target '+t.cal+' kcal / '+t.carbs+'g C)</span></div>';
  if(plan.note) h+='<div class="muted" style="margin-top:6px">💡 '+esc(plan.note)+'</div>';
  h+='<button class="btn" id="addPlan">➕ Add this plan to today’s log</button>'
    +'<button class="btn sec" id="clearPlan">Clear suggestion</button>';
  return h;
}

function addPlanToLog(dk){
  var plan=getMealSug(dk); if(!plan||!plan.meals) return;
  var arr=getFoods(dk);
  plan.meals.forEach(function(m){ (m.items||[]).forEach(function(it){
    arr.push({id:"f"+Date.now()+Math.floor(Math.random()*1e4), name:(it.food||"Food")+(it.qty?" ("+it.qty+")":""), notes:m.name||"", photo:null,
      kcal:Math.round(it.calories||0), carb:Math.round(it.carbs_g||0), protein:Math.round(it.protein_g||0), fat:Math.round(it.fat_g||0)});
  }); });
  saveFoods(dk,arr); renderNutrition();
}

function suggestMeals(dk){
  var key=localStorage.getItem(AKEY);
  var st=document.getElementById("sugStatus");
  if(!key){ st.className="status err"; st.textContent="Set your Anthropic API key in Settings (below) first."; return; }
  var t=computeTargets(dk,today().getDay()); if(!t) return;
  var prefs=val("mealPrefs"); localStorage.setItem(FPKEY,prefs);
  st.className="status"; st.textContent="✨ Building your meal plan… (needs internet)";
  var btn=document.getElementById("suggestBtn"); if(btn) btn.disabled=true;

  var prompt='You are a practical diet planner. Build a realistic full-day meal plan that hits these daily targets as closely as possible (aim within 5%): '
    +'calories='+t.cal+', carbs_g='+t.carbs+', protein_g='+t.protein+', fat_g='+t.fat+'. '
    +'Use ONLY common foods that are easy to buy at a supermarket or minimart (eggs, bread, rice, oats, banana, apple, milk, yogurt, chicken breast, canned tuna, peanut butter, nuts, cheese, etc.). '
    +'Use simple countable quantities anyone can measure or count, e.g. "2 bananas", "3 eggs", "1 cup cooked rice", "2 slices bread", "1 can tuna", "200 ml milk", "1 tbsp peanut butter". '
    +'No obscure ingredients, no complicated recipes. '
    +(prefs?('Respect these preferences: '+prefs+'. '):'')
    +'Organise into Breakfast, Lunch, Dinner, and 1-2 Snacks. Make per-item calorie/macro numbers realistic for the stated quantity, and make the totals add up close to the targets. '
    +'Respond with ONLY this JSON and nothing else: {"meals":[{"name":"Breakfast","items":[{"food":"Banana","qty":"2 medium","calories":210,"carbs_g":54,"protein_g":3,"fat_g":1}]}],"totals":{"calories":0,"carbs_g":0,"protein_g":0,"fat_g":0},"note":"one short practical tip"}';

  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:AI_MODEL,max_tokens:1500,messages:[{role:"user",content:[{type:"text",text:prompt}]}]})
  })
  .then(function(res){return res.json();})
  .then(function(data){
    if(data.error) throw new Error(data.error.message||"API error");
    var txt=(data.content&&data.content[0]&&data.content[0].text)||"";
    var m=txt.match(/\{[\s\S]*\}/); if(!m) throw new Error("Couldn't read the plan.");
    var plan=JSON.parse(m[0]);
    setMealSug(dk,plan); renderNutrition();
  })
  .catch(function(e){ st.className="status err"; st.textContent="Error: "+e.message+" (check key & internet)"; if(btn) btn.disabled=false; });
}

/* ======================================================================
   RUNNING  ·  editable weekly schedule + completed-run log
====================================================================== */
const RPKEY="ubw_runplan_v1";
const RUN_TYPES=["Easy","Long","Tempo","Intervals","Recovery","Race"];
const DEFAULT_RUNPLAN={0:null,1:null,2:{type:"Easy",km:5,min:30,note:""},3:null,4:{type:"Intervals",km:6,min:40,note:"e.g. 6×400m hard"},5:null,6:{type:"Long",km:12,min:75,note:""}};
function loadRunPlan(){ try{var s=JSON.parse(localStorage.getItem(RPKEY)); if(s&&typeof s==="object")return s;}catch(e){} return JSON.parse(JSON.stringify(DEFAULT_RUNPLAN)); }
function saveRunPlan(){ localStorage.setItem(RPKEY, JSON.stringify(RUNPLAN)); }
let RUNPLAN = loadRunPlan();

function getRunLog(){ try{return JSON.parse(localStorage.getItem(RKEY))||{}}catch(e){return{}} }
function deleteRun(dk){ var all=getRunLog(); delete all[dk]; localStorage.setItem(RKEY, JSON.stringify(all)); }
function recentRuns(n){ var all=getRunLog();
  return Object.keys(all).filter(function(k){return all[k]&&(+all[k].km||+all[k].min);}).sort().reverse().slice(0,n)
    .map(function(k){var o=all[k]; return {date:k,type:o.type||"Run",km:+o.km||0,min:+o.min||0,feel:o.feel||"",note:o.note||""};}); }
function pace(km,min){ if(!km||!min)return "—"; var p=min/km, m=Math.floor(p), s=Math.round((p-m)*60); if(s===60){m++;s=0;} return m+":"+String(s).padStart(2,"0")+"/km"; }
function weekStats(){ var dates=weekDates().map(dateKey), all=getRunLog(), km=0, n=0;
  dates.forEach(function(d){ if(all[d]&&(+all[d].km||+all[d].min)){ km+=+all[d].km||0; n++; } }); return {km:Math.round(km*10)/10, n:n}; }
function fmtDate(s){ var p=s.split("-"); return DOW[(new Date(+p[0],+p[1]-1,+p[2])).getDay()]+" "+(+p[2])+"/"+(+p[1]); }

function renderRunning(){
  var el=document.getElementById("view-running");
  var dow=today().getDay(), dk=TKEY;
  var plan=RUNPLAN[dow], done=getRun(dk), hasDone=(+done.km||+done.min), ws=weekStats();
  var h="";

  h+='<div class="statline"><div class="stat"><div class="v">'+ws.km+'</div><div class="l">km this week</div></div>'
    +'<div class="stat"><div class="v">'+ws.n+'</div><div class="l">runs this week</div></div></div>';

  h+='<div class="ncard"><h3>🏃 Today’s run <span class="muted">· '+DOW[dow]+'</span></h3>';
  if(plan){ h+='<div class="muted"><span class="rt">'+esc(plan.type)+'</span>Planned: '+(plan.km?plan.km+' km':'')+(plan.km&&plan.min?' · ':'')+(plan.min?plan.min+' min':'')+(plan.note?' — '+esc(plan.note):'')+'</div>'; }
  else { h+='<div class="muted">No run planned for today.</div>'; }
  if(hasDone){ h+='<div class="status ok" style="margin-top:8px">✓ Done: '+(+done.km||0)+' km · '+(+done.min||0)+' min · '+pace(+done.km,+done.min)+(done.feel?' · '+esc(done.feel):'')+'</div>'; }

  h+='<label class="field">Type'+selectHtml("rgType",RUN_TYPES.map(function(t){return [t,t];}),(done.type||(plan&&plan.type)||"Easy"))+'</label>'
    +'<div class="row2"><label class="field">Distance (km)<input id="rgKm" type="number" inputmode="decimal" step="0.1" value="'+(done.km||(plan&&plan.km)||"")+'"></label>'
      +'<label class="field">Time (min)<input id="rgMin" type="number" inputmode="numeric" value="'+(done.min||(plan&&plan.min)||"")+'"></label></div>'
    +'<label class="field">How it felt'+selectHtml("rgFeel",[["","—"],["Great","Great 💪"],["Good","Good 🙂"],["OK","OK 😐"],["Tough","Tough 😮‍💨"]],done.feel||"")+'</label>'
    +'<label class="field">Note<input id="rgNote" value="'+esc(done.note||"")+'" placeholder="optional"></label>'
    +'<button class="btn" id="logRun">'+(hasDone?"Update today’s run":"✓ Log run as done")+'</button>'
    +(hasDone?'<button class="btn sec" id="clearRun">Remove today’s run</button>':'')
    +'</div>';

  h+='<div class="ncard"><h3>🗓️ Weekly run schedule</h3><div class="muted">Your planned runs — tap edit to change any day.</div>';
  for(var i=1;i<=7;i++){ var d=i%7, pl=RUNPLAN[d];
    h+='<div class="runrow'+(d===dow?' today':'')+'"><div class="d">'+DOW[d]+(d===dow?' <small>· today</small>':'')+'</div>'
      +'<div class="info">'+(pl?('<span class="rt">'+esc(pl.type)+'</span>'+(pl.km?pl.km+' km':'')+(pl.km&&pl.min?' · ':'')+(pl.min?pl.min+' min':'')):'Rest')+'</div></div>';
  }
  h+='<div class="toolbar"><button class="miniedit" id="editRunPlan">✏️ Edit running schedule</button></div><div id="runPlanEditor"></div></div>';

  var hist=recentRuns(12);
  h+='<div class="ncard"><h3>📜 Recent runs</h3>';
  if(hist.length){ hist.forEach(function(rr){ h+='<div class="hist"><div class="hl">'+fmtDate(rr.date)+'<br><span class="rt">'+esc(rr.type)+'</span></div>'
    +'<div class="hr">'+rr.km+' km · '+rr.min+' min<br><span class="hl">'+pace(rr.km,rr.min)+(rr.feel?' · '+esc(rr.feel):'')+'</span></div></div>'; }); }
  else { h+='<div class="muted" style="margin-top:8px">No runs logged yet.</div>'; }
  h+='</div>';

  el.innerHTML=h;
  bindRunning(dk);
}

function bindRunning(dk){
  var lr=document.getElementById("logRun");
  if(lr) lr.onclick=function(){
    var km=+val("rgKm")||0, min=+val("rgMin")||0;
    if(!km && !min){ alert("Enter distance or time first."); return; }
    saveRun(dk,{type:val("rgType")||"Easy",km:km,min:min,feel:val("rgFeel"),note:val("rgNote"),done:true});
    renderRunning(); renderWeek();

  var cr=document.getElementById("clearRun");
  if(cr) cr.onclick=function(){ deleteRun(dk); renderRunning(); renderWeek(); };

      +'<div class="sub" style="margin-top:6px">'

        +'<input id="rp_m_'+d+'" type="number" inputmode="numeric" placeholder="min" value="'+(pl.min||"")+'">'

    }
    saveRunPlan(); renderRunning(); renderWeek();
  };
}

/* ---- workout split editor + summary ---- */
function renderSplitEditor(){
  var wrap=document.getElementById("splitEditor"); if(!wrap) return;
  if(wrap.innerHTML){ wrap.innerHTML=""; return; }
  var dow=today().getDay();
  var opts=[["","Rest"]].concat(Object.keys(DAYS).map(function(k){return [k,DAYS[k].title];}));
  var h='<div class="ncard" style="margin-top:10px">';
  for(var i=1;i<=7;i++){ var d=i%7;
    h+='<div class="erow'+(d===dow?' today-row':'')+'"><div class="dlab">'+DOW[d]+'</div><div>'+selectHtml("wm_"+d,opts,WEEKMAP[d]||"")+'</div></div>';
  }
  h+='<button class="btn" id="saveSplit">Save weekly split</button></div>';
  wrap.innerHTML=h;
  document.getElementById("saveSplit").onclick=function(){
    for(var i=1;i<=7;i++){ var d=i%7; WEEKMAP[d]=val("wm_"+d); }
    saveWeekMap();
    renderToday(); renderWeek(); renderList(); renderSplitSummary();
    wrap.innerHTML="";
  };
}
function renderSplitSummary(){
  var el=document.getElementById("splitSummary"); if(!el) return;
  var parts=[]; for(var i=1;i<=7;i++){ var d=i%7; if(WEEKMAP[d]&&DAYS[WEEKMAP[d]]) parts.push('<span class="pill">'+DOW[d]+' — '+DAYS[WEEKMAP[d]].title+'</span>'); }
  el.innerHTML='Your split &nbsp;·&nbsp; '+(parts.length?parts.join(" "):'<span class="pill rest">No training days set — tap “Edit weekly split”.</span>');
}

/* ---- tabs ---- */
function switchTab(v){
  document.querySelectorAll(".tab").forEach(function(x){ x.classList.toggle("on", x.getAttribute("data-view")===v); });
  document.getElementById("view-workout").style.display  = v==="workout"?"":"none";
  document.getElementById("view-running").style.display  = v==="running"?"":"none";
  document.getElementById("view-nutrition").style.display= v==="nutrition"?"":"none";
  if(v==="running") renderRunning();
  if(v==="nutrition") renderNutrition();
  window.scrollTo(0,0);
}
document.querySelectorAll(".tab").forEach(function(t){ t.onclick=function(){ switchTab(t.getAttribute("data-view")); }; });

/* ---- init ---- */
document.getElementById("editSplit").onclick=renderSplitEditor;
renderToday(); renderWeek(); renderList(); renderSplitSummary();
</script>
<script>
  if("serviceWorker" in navigator){ window.addEventListener("load",function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); }); }
</script>
